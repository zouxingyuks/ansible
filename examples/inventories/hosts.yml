---
# 示例主机库存文件，供当前 Ansible/Semaphore 运维 playbook 参考。
# 这里使用文档保留地址，请替换为真实节点地址。
# SSH 私钥、密码、sudo 密码等敏感凭据应由 Semaphore credential 或 SSH 配置管理，不要写入仓库。

all:
  hosts:
    node-1:
      ansible_host: 192.0.2.10
      ansible_user: ansible
      ansible_port: 36633
    node-2:
      ansible_host: 192.0.2.11
      ansible_user: ansible
      ansible_port: 36633
  vars:
    ansible_become: true
    ansible_become_method: sudo
    ansible_become_user: root
